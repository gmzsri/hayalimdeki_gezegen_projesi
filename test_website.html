<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayalimdeki Gezegen - Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #4A90E2 0%, #FFB74D 100%);
            color: white;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: white;
            color: #4A90E2;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin: 10px;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Hayalimdeki Gezegen</h1>
        <p>Web sitesi başarıyla oluşturuldu! 🎉</p>
        <p>Bu test sayfası, web sitesinin çalıştığını doğrulamak için oluşturulmuştur.</p>
        <a href="docs/index.html" class="btn">Ana Web Sitesini Görüntüle</a>
        <a href="README.md" class="btn">README Dosyasını Görüntüle</a>
    </div>
</body>
</html>
